# Rebuilds and publishes the store index on GitHub Pages.
#
# 100% automated, zero human approval (B.9 of the external integrations plan):
# publishing an integration = tagging a public GitHub repo with the
# `gladys-assistant-integration` topic. This workflow crawls the topic every
# hour, validates each manifest mechanically, and publishes index.json,
# rejected.json, the canonical manifest.schema.json and the re-hosted covers.
#
# The store is forkable: STORE_BASE_URL is derived from the repository name,
# so a fork publishes its own working index without any change.
name: Build and publish index

on:
  schedule:
    - cron: '13 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build index
        run: npm run build-index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STORE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        # enablement: true creates the Pages site on first run, so a fresh
        # repo (or a fork) needs zero manual configuration.
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
